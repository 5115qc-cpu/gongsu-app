<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>업무일지 팝업 v2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg:      #121212;
  --surface: #1A1A1A;
  --card:    #1E1E1E;
  --border:  #2E2E2E;
  --coral:   #E8927C;
  --txt1:    #E8E8E8;
  --txt2:    #CCCCCC;
  --txt3:    #888888;
  --btnbg:   #2A1810;
}
body {
  background: #0a0a0a;
  display: flex; justify-content: center;
  min-height: 100vh; padding: 24px 12px;
  font-family: 'Noto Sans KR', sans-serif;
}
.phone {
  width: 360px; height: 780px;
  background: var(--bg);
  border-radius: 36px; border: 1.5px solid var(--border);
  overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,0.8);
  display: flex; flex-direction: column;
  position: relative;
}
.statusbar {
  background: var(--surface); padding: 6px 14px 3px;
  display: flex; justify-content: space-between;
  font-size: 10px; color: var(--txt3); flex-shrink: 0;
}
/* 헤더 */
.p-header {
  background: var(--surface); padding: 8px 12px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.p-title { color: var(--txt1); font-size: 14px; font-weight: 700; }
.p-sub   { color: var(--txt3); font-size: 11px; margin-top: 1px; }
.p-close {
  background: var(--btnbg); border: 0.5px solid var(--coral);
  color: var(--coral); font-size: 12px; font-weight: 700;
  padding: 5px 10px; border-radius: 7px; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif; flex-shrink: 0;
}
/* 바디 */
.p-body {
  flex: 1; display: flex; flex-direction: column;
  padding: 8px; overflow-y: auto; gap: 6px;
  scrollbar-width: none; -ms-overflow-style: none;
}
.p-body::-webkit-scrollbar { display: none; }
#workArea {
  display: flex; flex-direction: column; gap: 6px;
}
.half-wrap {
  display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
}
.half-wrap .wcard { flex: 1; }
/* 첫 행: 작업 1개일때 100%, 2개일때 나란히 */
.work-row-pair {
  display: flex; gap: 6px; flex: 1;
}
/* 작업 추가 행 (2개 초과분) */
.work-extra-pair {
  display: flex; gap: 6px;
}
/* 카드 */
.wcard {
  flex: 1; display: flex; flex-direction: column;
  background: var(--card); border: 0.5px solid var(--border);
  border-radius: 10px; overflow: hidden; 
}
/* 행 */
.wrow {
  display: flex; align-items: stretch;
  border-bottom: 0.5px solid var(--border);
  min-height: 44px;
}
.wrow:last-child { border-bottom: none; }
/* 라벨 */
.wlbl {
  color: var(--coral); font-size: 10px; font-weight: 700;
  padding: 6px 4px; min-width: 52px; max-width: 52px; white-space: nowrap;
  border-right: 0.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  text-align: center; line-height: 1.3; flex-shrink: 0;
}
/* 인원 조절 */
.ppl-wrap {
  flex: 1; display: flex; align-items: center;
}
.ppl-btn {
  background: var(--btnbg); color: var(--coral);
  border: none; font-size: 15px; font-weight: 700;
  padding: 0 10px; cursor: pointer; align-self: stretch;
  display: flex; align-items: center;
}
.ppl-num {
  flex: 1; text-align: center;
  color: var(--txt1); font-size: 13px; font-weight: 700;
}
/* textarea 공통 */
.wta {
  flex: 1; background: none; border: none; outline: none;
  color: var(--txt2); font-size: 12px;
  padding: 6px 8px; resize: none; line-height: 1.5;
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 44px; overflow: hidden; width: 100%;
}
/* 작업내용 래퍼 */
.wcontent {
  display: flex; flex-direction: column; flex: 1;
}
.wcontent-hd {
  display: flex; align-items: center; min-height: 44px;
  border-bottom: 0.5px solid var(--border); flex-shrink: 0;
}
.wcontent-lbl {
  color: var(--coral); font-size: 10px; font-weight: 700;
  padding: 6px; flex: 1;
}
.del-btn {
  background: #2A1010; border: 0.5px solid #883333;
  color: #CC6666; font-size: 9px; font-weight: 700;
  padding: 3px 7px; border-radius: 5px; cursor: pointer;
  margin-right: 6px; font-family: 'Noto Sans KR', sans-serif;
}
/* 작업추가 버튼 */
.add-btn {
  width: 100%; padding: 10px; flex-shrink: 0;
  background: var(--card); border: 1.5px dashed var(--coral);
  border-radius: 9px; color: var(--coral);
  font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
}
</style>
</head>
<body>
<div class="phone" id="phone">
  <div class="statusbar"><span>9:41</span><span>🔋 100%</span></div>
  <div class="p-header">
    <div>
      <div class="p-title">업무일지</div>
      <div class="p-sub" id="pDate"></div>
    </div>
    <button class="p-close" onclick="history.back()">돌아가기 ✕</button>
  </div>
  <div class="p-body">
    <div id="workArea"></div>
    <button class="add-btn" onclick="addWork()">＋ 작업 추가</button>
  </div>
</div>

<script>
// 오늘 날짜
const _d = new Date();
const _days = ['일','월','화','수','목','금','토'];
document.getElementById('pDate').textContent =
  `${_d.getMonth()+1}월 ${_d.getDate()}일 (${_days[_d.getDay()]}) 작업일보`;

let works = [
  { ppl: 2, loc: 'Y11 X2 1층 / Y1-W01 MCC 102A', content: '450 트레이 양중 및 설치' }
];

function buildCard(i) {
  const showDel = works.length > 1;
  return `
    <div class="wcard" id="card${i}">
      <div class="wrow">
        <span class="wlbl">작업인원</span>
        <div class="ppl-wrap">
          <button class="ppl-btn" onclick="chPpl(${i},-1)">－</button>
          <span class="ppl-num" id="ppl${i}">${works[i].ppl}명</span>
          <button class="ppl-btn" onclick="chPpl(${i},1)">＋</button>
        </div>
      </div>
      <div class="wrow">
        <span class="wlbl">작업위치</span>
        <textarea class="wta" id="loc${i}" oninput="grow(this);sv(${i})" placeholder="입력">${works[i].loc}</textarea>
      </div>
      <div class="wcontent">
        <div class="wcontent-hd">
          <span class="wcontent-lbl">작업내용</span>
          ${showDel ? `<button class="del-btn" onclick="delWork(${i})">작업삭제</button>` : ''}
        </div>
        <textarea class="wta" id="con${i}" oninput="grow(this);sv(${i})" placeholder="입력">${works[i].content}</textarea>
      </div>
    </div>`;
}

function getCardH() {
  const body = document.getElementById('pBody');
  const btn = document.querySelector('.add-btn');
  if (!body || !btn) return 300;
  return Math.floor((body.clientHeight - btn.offsetHeight - 22) / 2);
}

function render() {
  const area = document.getElementById('workArea');
  area.innerHTML = '';
  const h = getCardH();

  works.forEach((_, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'half-wrap';
    wrap.style.height = (works.length === 1 ? (getCardH() * 2 + 6) + 'px' : h + 'px');
    wrap.innerHTML = buildCard(i);
    area.appendChild(wrap);
  });

  works.forEach((_, i) => {
    setTimeout(() => {
      const l = document.getElementById('loc' + i);
      const c = document.getElementById('con' + i);
      if (l) { l.style.height = 'auto'; l.style.height = l.scrollHeight + 'px'; }
      if (c) { c.style.height = 'auto'; c.style.height = c.scrollHeight + 'px'; }
    }, 0);
  });
}

function grow(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function chPpl(i, d) {
  works[i].ppl = Math.max(1, works[i].ppl + d);
  const el = document.getElementById('ppl' + i);
  if (el) el.textContent = works[i].ppl + '명';
}

function addWork() {
  works.push({ ppl: 2, loc: '', content: '' });
  render();
}

function delWork(i) {
  if (works.length <= 1) return;
  works.splice(i, 1);
  render();
}

let svTimer;
function sv(i) {
  clearTimeout(svTimer);
  svTimer = setTimeout(() => {
    const l = document.getElementById('loc' + i);
    const c = document.getElementById('con' + i);
    if (l) works[i].loc = l.value;
    if (c) works[i].content = c.value;
  }, 600);
}

// 키보드 대응
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    const a = document.activeElement;
    if (!a || a.tagName !== 'TEXTAREA') return;
    const vvh = window.visualViewport.height;
    const rect = a.getBoundingClientRect();
    const phone = document.getElementById('phone');
    if (rect.bottom > vvh - 16) {
      phone.style.transform = `translateY(-${rect.bottom - (vvh - 16)}px)`;
    } else {
      phone.style.transform = '';
    }
  });
}

render();
</script>
</body>
</html>
