<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>팀방 v1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg:      #121212;
  --surface: #1A1A1A;
  --card:    #1E1E1E;
  --border:  #2E2E2E;
  --coral:   #E8927C;
  --txt1:    #E8E8E8;
  --txt2:    #CCCCCC;
  --txt3:    #888888;
}
body {
  background: #0a0a0a;
  display: flex; justify-content: center;
  min-height: 100vh; padding: 24px 12px;
  font-family: 'Noto Sans KR', sans-serif;
}
.phone {
  width: 360px; height: 780px;
  background: var(--bg);
  border-radius: 36px; border: 1.5px solid var(--border);
  overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,0.8);
  display: flex; flex-direction: column;
}
.statusbar {
  background: var(--surface); padding: 6px 14px 3px;
  display: flex; justify-content: space-between;
  font-size: 10px; color: var(--txt3); flex-shrink: 0;
}
.appbar {
  background: var(--surface); padding: 10px 14px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.appbar-title { color: var(--txt1); font-size: 16px; font-weight: 700; }
.write-btn {
  background: var(--coral); color: #fff; font-size: 12px; font-weight: 700;
  padding: 7px 14px; border-radius: 8px; border: none;
  cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
}
.scroll { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }

/* 공지 카드 */
.notice-card {
  background: var(--card); border: 0.5px solid var(--border);
  border-radius: 12px; overflow: hidden;
}
.notice-card.pinned { border-color: var(--coral); }
.notice-head {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 14px 6px;
}
.pin-icon { color: var(--coral); font-size: 11px; }
.notice-author { color: var(--txt1); font-size: 12px; font-weight: 700; }
.notice-time { color: var(--txt3); font-size: 10px; margin-left: auto; }
.more-btn {
  background: none; border: none; color: var(--txt3); font-size: 16px;
  cursor: pointer; padding: 0 4px; line-height: 1; position: relative;
}
.more-menu {
  display: none; position: absolute; top: 26px; right: 0;
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: 8px; overflow: hidden; z-index: 10; min-width: 90px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}
.more-menu.show { display: block; }
.more-menu button {
  width: 100%; padding: 10px 14px; background: none; border: none;
  color: #E87C7C; font-size: 12px; font-weight: 600; text-align: left;
  cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
}
.more-menu button:active { background: var(--card); }
.notice-body {
  padding: 0 14px 10px; color: var(--txt2); font-size: 13px; line-height: 1.6;
  white-space: pre-wrap; cursor: pointer;
  display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical;
  overflow: hidden;
}
.notice-foot {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 14px; border-top: 0.5px solid var(--border);
}
.read-count { color: var(--txt3); font-size: 11px; }
.read-count b { color: var(--coral); }
.confirm-btn {
  background: var(--surface); color: var(--txt2); font-size: 11px; font-weight: 700;
  padding: 5px 14px; border-radius: 6px; border: 0.5px solid var(--border);
  cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
}
.confirm-btn.done { background: rgba(232,146,124,0.12); color: var(--coral); border-color: var(--coral); }

/* 빈 슬롯 안내 */
.slot-info {
  text-align: center; color: var(--txt3); font-size: 11px; padding: 8px 0;
}

/* 글쓰기 팝업 */
.write-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 100; justify-content: center; align-items: center;
}
.write-overlay.show { display: flex; }
.write-sheet {
  background: var(--surface); border-radius: 16px; width: 320px;
  border: 1px solid var(--border); padding: 16px;
}
.write-title { color: var(--txt1); font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.write-sub { color: var(--txt3); font-size: 11px; margin-bottom: 12px; }
.write-ta {
  width: 100%; min-height: 120px; background: var(--card);
  border: 0.5px solid var(--border); border-radius: 10px;
  color: var(--txt2); font-size: 13px; padding: 10px 12px;
  resize: none; outline: none; line-height: 1.6;
  font-family: 'Noto Sans KR', sans-serif; margin-bottom: 10px;
}
.write-ta:focus { border-color: var(--coral); }
.pin-toggle { display: flex; align-items: center; gap: 6px; margin-bottom: 14px; }
.pin-toggle input { accent-color: var(--coral); }
.pin-toggle span { color: var(--txt2); font-size: 12px; }
.write-btns { display: flex; gap: 8px; }
.write-cancel, .write-submit {
  flex: 1; height: 44px; border-radius: 10px; border: none;
  font-size: 14px; font-weight: 700; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
}
.write-cancel { background: var(--card); color: var(--txt3); border: 0.5px solid var(--border); }
.write-submit { background: var(--coral); color: #fff; }

/* 상세보기 팝업 */
.detail-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 150; justify-content: center; align-items: center;
}
.detail-overlay.show { display: flex; }
.detail-sheet {
  background: var(--surface); border-radius: 16px; width: 320px;
  max-height: 70vh; border: 1px solid var(--border);
  display: flex; flex-direction: column;
}
.detail-head {
  display: flex; align-items: center; gap: 6px;
  padding: 14px 16px 10px; border-bottom: 0.5px solid var(--border);
}
.detail-author { color: var(--txt1); font-size: 13px; font-weight: 700; }
.detail-time { color: var(--txt3); font-size: 10px; margin-left: auto; }
.detail-close { background: none; border: none; color: var(--txt3); font-size: 16px; cursor: pointer; }
.detail-body {
  padding: 14px 16px; color: var(--txt2); font-size: 13px; line-height: 1.7;
  white-space: pre-wrap; overflow-y: auto;
}

/* 하단 탭 */
.bottom-nav {
  background: var(--surface); border-top: 1px solid var(--border);
  display: flex; height: 56px; flex-shrink: 0;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 2px; cursor: pointer;
}
.nav-icon { font-size: 18px; }
.nav-lbl { font-size: 9px; color: var(--txt3); }
.nav-lbl.on { color: var(--coral); }
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar"><span>9:41</span><span>🔋 100%</span></div>
  <div class="appbar">
    <span class="appbar-title">팀방</span>
    <button class="write-btn" onclick="openWrite()">＋ 공지작성</button>
  </div>

  <div class="scroll" id="noticeScroll"></div>

  <div class="bottom-nav">
    <div class="nav-item"><span class="nav-icon">📅</span><span class="nav-lbl">업무</span></div>
    <div class="nav-item"><span class="nav-icon">💰</span><span class="nav-lbl">수익</span></div>
    <div class="nav-item"><span class="nav-icon">👥</span><span class="nav-lbl">팀</span></div>
    <div class="nav-item"><span class="nav-icon">📢</span><span class="nav-lbl on">팀방</span></div>
    <div class="nav-item"><span class="nav-icon">⚙️</span><span class="nav-lbl">설정</span></div>
  </div>
</div>

<!-- 글쓰기 팝업 -->
<div class="write-overlay" id="writeOverlay">
  <div class="write-sheet">
    <div class="write-title">공지 작성</div>
    <div class="write-sub" id="writeSub">최대 6개까지 등록됩니다</div>
    <textarea class="write-ta" id="writeTa" placeholder="공지 내용을 입력하세요 (길이 제한 없음)" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,300)+'px';"></textarea>
    <label class="pin-toggle">
      <input type="checkbox" id="pinCheck">
      <span>상단 고정</span>
    </label>
    <div class="write-btns">
      <button class="write-cancel" onclick="closeWrite()">취소</button>
      <button class="write-submit" onclick="submitNotice()">등록</button>
    </div>
  </div>
</div>

<!-- 상세보기 팝업 -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-sheet">
    <div class="detail-head">
      <span class="pin-icon" id="detailPin" style="display:none;">📌</span>
      <span class="detail-author" id="detailAuthor"></span>
      <span class="detail-time" id="detailTime"></span>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>
</div>

<script>
var MAX_NOTICE = 6;
var TEAM_SIZE = 18;

var notices = [
  { author:'이기석(팀장)', time:'5월 25일 오후 6:12', body:'내일 오전 7시 B동 입구 집합합니다.', pinned:true, readCount:12, confirmed:false },
  { author:'이기석(팀장)', time:'5월 23일 오후 5:44', body:'이번주 토요일 특근 있습니다. 참여 가능하신 분은 댓글 대신 출석체크로 알려주세요.', pinned:false, readCount:15, confirmed:true },
  { author:'이기석(팀장)', time:'5월 20일 오전 8:02', body:'안전화 필수 착용! 현장 안전관리 강화됩니다.', pinned:false, readCount:18, confirmed:true },
];

function render() {
  var scroll = document.getElementById('noticeScroll');
  scroll.innerHTML = '';
  var sorted = notices.slice().sort(function(a,b){ return (b.pinned?1:0) - (a.pinned?1:0); });
  sorted.forEach(function(n, idx) {
    var card = document.createElement('div');
    card.className = 'notice-card' + (n.pinned ? ' pinned' : '');
    card.innerHTML =
      '<div class="notice-head" style="position:relative;">' +
        (n.pinned ? '<span class="pin-icon">📌</span>' : '') +
        '<span class="notice-author">' + n.author + '</span>' +
        '<span class="notice-time">' + n.time + '</span>' +
        '<button class="more-btn" onclick="toggleMenu(event,' + notices.indexOf(n) + ')">⋮</button>' +
        '<div class="more-menu" id="menu' + notices.indexOf(n) + '">' +
          '<button onclick="event.stopPropagation();deleteNotice(' + notices.indexOf(n) + ')">삭제</button>' +
        '</div>' +
      '</div>' +
      '<div class="notice-body" onclick="openDetail(' + notices.indexOf(n) + ')">' + n.body + '</div>' +
      '<div class="notice-foot">' +
        '<span class="read-count"><b>' + n.readCount + '</b>/' + TEAM_SIZE + '명 읽음</span>' +
        '<button class="confirm-btn' + (n.confirmed?' done':'') + '" onclick="toggleConfirm(' + notices.indexOf(n) + ')">' +
          (n.confirmed ? '확인완료 ✓' : '확인') +
        '</button>' +
      '</div>';
    scroll.appendChild(card);
  });
  var remain = MAX_NOTICE - notices.length;
  var info = document.createElement('div');
  info.className = 'slot-info';
  info.textContent = remain > 0 ? '공지 ' + notices.length + '/' + MAX_NOTICE + ' · ' + remain + '개 더 등록 가능' : '공지함이 가득 찼습니다 (최대 ' + MAX_NOTICE + '개)';
  scroll.appendChild(info);
}

function openDetail(i) {
  var n = notices[i];
  document.getElementById('detailAuthor').textContent = n.author;
  document.getElementById('detailTime').textContent = n.time;
  document.getElementById('detailBody').textContent = n.body;
  document.getElementById('detailPin').style.display = n.pinned ? 'inline' : 'none';
  document.getElementById('detailOverlay').classList.add('show');
}
function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('show');
}

function toggleMenu(e, i) {
  e.stopPropagation();
  document.querySelectorAll('.more-menu').forEach(function(m){
    if (m.id !== 'menu'+i) m.classList.remove('show');
  });
  document.getElementById('menu'+i).classList.toggle('show');
}
document.addEventListener('click', function(){
  document.querySelectorAll('.more-menu').forEach(function(m){ m.classList.remove('show'); });
});

function deleteNotice(i) {
  if (!confirm('이 공지를 삭제하시겠습니까?')) return;
  notices.splice(i, 1);
  render();
}

function toggleConfirm(i) {
  notices[i].confirmed = !notices[i].confirmed;
  if (notices[i].confirmed) notices[i].readCount = Math.min(TEAM_SIZE, notices[i].readCount + 1);
  render();
}

function openWrite() {
  if (notices.length >= MAX_NOTICE) {
    alert('공지는 최대 ' + MAX_NOTICE + '개까지만 등록 가능합니다.\n기존 공지를 삭제한 후 다시 시도해주세요.');
    return;
  }
  document.getElementById('writeTa').value = '';
  document.getElementById('pinCheck').checked = false;
  document.getElementById('writeOverlay').classList.add('show');
}
function closeWrite() {
  document.getElementById('writeOverlay').classList.remove('show');
}
function submitNotice() {
  var text = document.getElementById('writeTa').value.trim();
  if (!text) { alert('공지 내용을 입력해주세요.'); return; }
  var pinned = document.getElementById('pinCheck').checked;
  if (pinned) notices.forEach(function(n){ n.pinned = false; });
  notices.unshift({
    author: '이기석(팀장)', time: '방금 전',
    body: text, pinned: pinned, readCount: 0, confirmed: false
  });
  closeWrite();
  render();
}

render();
</script>
</body>
</html>
